name: setup-kairos
description: Install uv, pin Python, and install kairos in a uv-managed venv (PEP 668 safe).

inputs:
  python-version:
    description: "Python version to install and use, e.g. 3.11, 3.12, 3.13"
    required: true
  extras:
    description: "Extras suffix appended to '.', e.g. '[dev]' or '' for none"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
      with:
        enable-cache: false

    - name: Install Python ${{ inputs.python-version }}
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Create venv with target Python
      shell: bash
      run: uv venv --python ${{ inputs.python-version }}

    - name: Install kairos (editable) with extras "${{ inputs.extras }}"
      shell: bash
      run: uv pip install -e ".${{ inputs.extras }}"
