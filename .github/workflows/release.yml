name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write    # required by softprops/action-gh-release to attach assets
  id-token: write    # required by pypa/gh-action-pypi-publish for OIDC trusted publishing

jobs:
  test:
    name: test (py${{ matrix.python-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-kairos
        with:
          python-version: ${{ matrix.python-version }}
          extras: "[dev]"
      - run: uv run pytest -ra --strict-markers

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-kairos
        with:
          python-version: "3.13"
          extras: "[dev]"
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/ tests/

  build-and-publish:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, lint]
    environment:
      name: pypi
      url: https://pypi.org/project/kairos-agent/
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build sdist + wheel
        run: uv build

      - name: List built artifacts
        run: ls -la dist/

      - name: Publish to PyPI (Trusted Publishing OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # No api token; OIDC handshake authenticates via the configured Trusted Publisher.

      - name: Attach wheel + sdist to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Only ship real artifacts; uv build leaves a marker `.gitignore` in dist/
          # that we do NOT want as a release asset (caught on v0.2.1).
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.attestation
          generate_release_notes: true
          fail_on_unmatched_files: true
