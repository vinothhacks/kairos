name: release

on:
  push:
    tags: ["v*.*.*"]

permissions: {}

jobs:
  test:
    name: test (py${{ matrix.python-version }} on ${{ matrix.os }})
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-kairos
        with:
          python-version: ${{ matrix.python-version }}
          extras: "[dev]"
      - run: uv run pytest -ra --strict-markers

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-kairos
        with:
          python-version: "3.13"
          extras: "[dev]"
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/ tests/

  build-and-publish:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/kairos-agent/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          tag="${tag#v}"
          pyproject_version="$(
            python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )"
          init_version="$(
            python - <<'PY'
          import pathlib
          import re
          text = pathlib.Path("src/kairos/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit("__version__ missing from src/kairos/__init__.py")
          print(match.group(1))
          PY
          )"
          if [ "$tag" != "$pyproject_version" ] || [ "$tag" != "$init_version" ]; then
            echo "tag=$tag pyproject.toml=$pyproject_version src/kairos/__init__.py=$init_version mismatch" >&2
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - name: List built artifacts
        run: ls -la dist/

      - name: Publish to PyPI (Trusted Publishing OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/
          # No api token; OIDC handshake authenticates via the configured Trusted Publisher.

      - name: Attach wheel + sdist to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          # Only ship real artifacts; uv build leaves a marker `.gitignore` in dist/
          # that we do NOT want as a release asset (caught on v0.2.1).
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.attestation
          generate_release_notes: true
          fail_on_unmatched_files: true
