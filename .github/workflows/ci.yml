name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up kairos (uv venv, no --system)
        uses: ./.github/actions/setup-kairos
        with:
          python-version: ${{ matrix.python-version }}
          extras: "[dev]"

      - name: Run pytest with coverage
        run: uv run pytest -ra --strict-markers --cov=kairos --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kairos (uv venv, no --system)
        uses: ./.github/actions/setup-kairos
        with:
          python-version: "3.13"
          extras: "[dev]"

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Mypy (src + tests)
        run: uv run mypy src/ tests/

      - name: pip-audit (KAI-013)
        run: uv run pip-audit --strict --ignore-vuln PYSEC-2022-43012 || true

  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build
        run: uv build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  wiki-lint:
    name: wiki lint (own seed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kairos (uv venv, no --system)
        uses: ./.github/actions/setup-kairos
        with:
          python-version: "3.13"
          extras: ""

      - name: Init kairos in tmp
        run: |
          mkdir -p /tmp/kairos-ci
          KAIROS_LLM_BACKEND=stub uv run kairos init /tmp/kairos-ci

      - name: Lint own seed wiki
        run: KAIROS_LLM_BACKEND=stub uv run kairos lint -p /tmp/kairos-ci

      - name: Smoke selector
        run: KAIROS_LLM_BACKEND=stub uv run kairos run "Search the docs for caching" -p /tmp/kairos-ci --dry

      - name: README demo drift check (KAI-014)
        run: |
          set -e
          KAIROS_LLM_BACKEND=stub uv run kairos run "Search the docs for caching" -p /tmp/kairos-ci --dry > /tmp/kairos-ci/demo.actual.txt
          if grep -qE 'top-3 techniques for:' /tmp/kairos-ci/demo.actual.txt && grep -qE '^\| 1 +\| (rag|react|reflexion) ' /tmp/kairos-ci/demo.actual.txt; then
            echo "Demo header + rank table present; schema unchanged."
          else
            echo "Demo output schema changed - regenerate the README 30-second demo block."
            cat /tmp/kairos-ci/demo.actual.txt
            exit 1
          fi
