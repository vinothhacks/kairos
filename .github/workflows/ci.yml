name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install project with dev extras
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest
        run: uv run pytest -ra --strict-markers

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install project
        run: uv pip install --system -e ".[dev]"

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Mypy
        run: uv run mypy src/

  build:
    name: build wheel
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build
        run: uv build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  wiki-lint:
    name: wiki lint (own seed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Install project
        run: uv pip install --system -e .

      - name: Init kairos in tmp
        run: |
          mkdir -p /tmp/kairos-ci
          KAIROS_LLM_BACKEND=stub uv run kairos init /tmp/kairos-ci

      - name: Lint own seed wiki
        run: KAIROS_LLM_BACKEND=stub uv run kairos lint -p /tmp/kairos-ci

      - name: Smoke selector
        run: KAIROS_LLM_BACKEND=stub uv run kairos run "Search the docs for caching" -p /tmp/kairos-ci --dry
